<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Inspiring Beauty Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg" />

  <style>
    /* ── Admin page shell ── */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; background: var(--n-50); }

    .admin-page-header {
      background: linear-gradient(135deg, var(--blue-d), var(--blue));
      color: #fff;
      height: 58px;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(20,40,90,.25);
    }
    .admin-page-header-left { display: flex; align-items: center; gap: 0.875rem; }
    .admin-page-header-left img { height: 34px; width: 34px; object-fit: contain; border-radius: 6px; }
    .admin-page-header-left h1 {
      font-family: var(--f-display); font-size: 1.125rem; font-weight: 700; color: #fff;
    }
    .admin-back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: var(--r-pill);
      color: rgba(255,255,255,.9);
      font-size: 0.8125rem; font-weight: 500;
      text-decoration: none;
      transition: background var(--t-fast), border-color var(--t-fast);
    }
    .admin-back-btn:hover { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }

    .admin-page-body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 210px; flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--n-200);
      padding: 1rem 0.75rem;
      overflow-y: auto;
    }
    .admin-tabs { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-tab {
      display: flex; align-items: center; gap: 0.625rem;
      width: 100%; padding: 0.6875rem 0.875rem;
      border-radius: var(--r-md); font-size: 0.8125rem; font-weight: 500;
      color: var(--n-600); cursor: pointer; border: none; background: none;
      font-family: inherit; text-align: left; transition: background var(--t-fast), color var(--t-fast);
    }
    .admin-tab:hover  { background: var(--n-100); color: var(--n-800); }
    .admin-tab.active { background: var(--blue-xl); color: var(--blue); font-weight: 600; }
    .admin-tab svg    { flex-shrink: 0; }

    /* Content */
    .admin-content { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* Stats */
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.875rem; margin-bottom: 1.5rem; }
    .admin-stat {
      background: var(--white); border-radius: var(--r-lg);
      padding: 1.25rem; border: 1.5px solid var(--n-200); box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .admin-stat-icon  { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .admin-stat-num   { font-family: var(--f-display); font-size: 1.75rem; font-weight: 700; color: var(--blue-d); }
    .admin-stat-label { font-size: 0.75rem; color: var(--n-500); margin-top: 0.25rem; }

    /* Card */
    .admin-card {
      background: var(--white); border-radius: var(--r-lg);
      border: 1.5px solid var(--n-200); padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .admin-card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .admin-card-head h4 { font-family: var(--f-body); font-size: 0.9375rem; font-weight: 700; color: var(--blue-d); }

    /* Table */
    .admin-table-wrap { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .admin-table th {
      text-align: left; padding: 0.625rem 0.875rem;
      background: var(--n-100); color: var(--n-500);
      font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
    }
    .admin-table th:first-child { border-radius: var(--r-md) 0 0 var(--r-md); }
    .admin-table th:last-child  { border-radius: 0 var(--r-md) var(--r-md) 0; }
    .admin-table td { padding: 0.75rem 0.875rem; border-bottom: 1px solid var(--n-100); vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--n-50); }

    /* Buttons */
    .admin-btn {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.4rem 0.875rem; border-radius: var(--r-md);
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      border: none; font-family: inherit;
      transition: background var(--t-fast);
    }
    .admin-btn-primary { background: var(--blue); color: #fff; }
    .admin-btn-primary:hover { background: var(--blue-d); }
    .admin-btn-danger  { background: var(--err-bg); color: var(--err); }
    .admin-btn-danger:hover  { background: #FCA5A5; }
    .admin-btn-success { background: var(--ok-bg); color: var(--ok); }
    .admin-btn-success:hover { background: #BBF7D0; }

    .status-select {
      font-size: 0.75rem; padding: 0.3rem 0.5rem;
      border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      outline: none; cursor: pointer;
    }
    .status-select:focus { border-color: var(--blue); }

    .chips-wrap { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--n-100); padding: 0.375rem 0.875rem;
      border-radius: var(--r-pill); font-size: 0.8125rem; color: var(--n-700);
    }
    .chip-del { color: var(--err); font-size: 1rem; line-height: 1; cursor: pointer; }

    /* Image preview */
    .img-preview-wrap { margin-top: 0.375rem; }
    .img-preview-wrap img,
    .img-preview-wrap video {
      max-width: 100%; max-height: 120px;
      border-radius: var(--r-lg); object-fit: contain;
      border: 1.5px solid var(--n-200); display: block;
    }

    /* Pills */
    .pill { display: inline-block; padding: .2rem .625rem; border-radius: var(--r-pill); font-size: .6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .pill-pending    { background: var(--warn-bg); color: #92400E; }
    .pill-confirmed  { background: var(--ok-bg);   color: #065F46; }
    .pill-processing { background: var(--info-bg); color: #1E40AF; }
    .pill-delivered  { background: #BBF7D0;         color: #14532D; }
    .pill-cancelled  { background: var(--err-bg);   color: #991B1B; }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem; align-items: center;
      pointer-events: none;
    }
    .toast {
      background: var(--n-800); color: #fff;
      padding: 0.75rem 1.5rem; border-radius: var(--r-xl);
      font-size: 0.875rem; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      opacity: 0; transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      white-space: nowrap; max-width: 90vw;
      pointer-events: auto;
    }
    .toast.show    { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--ok); }
    .toast.error   { background: var(--err); }

    /* ── Order filters ── */
    .order-filters {
      display: flex; flex-wrap: wrap; gap: 0.625rem; margin-bottom: 1rem;
    }
    .order-filter-input {
      flex: 1; min-width: 140px;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      font-size: 0.8125rem; font-family: inherit; outline: none;
      background: var(--white); color: var(--n-900);
      transition: border-color var(--t-fast);
    }
    .order-filter-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(20,85,164,.07); }

    /* ── Brand admin grid ── */
    .brand-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .brand-admin-card {
      background: var(--white);
      border: 1.5px solid var(--n-200); border-radius: var(--r-lg);
      padding: 1.25rem 1rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.625rem;
      text-align: center;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .brand-admin-card:hover { border-color: var(--blue-l); box-shadow: 0 4px 16px rgba(20,85,164,.1); }
    .brand-admin-card--edit { align-items: stretch; text-align: left; }
    .brand-admin-img {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--blue-xl); border: 1.5px solid var(--blue-l);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .brand-admin-name { font-size: 0.875rem; font-weight: 700; color: var(--n-800); }
    .brand-admin-actions { display: flex; gap: 0.375rem; }

    /* ── Image upload group ── */
    .img-upload-group {
      display: flex; gap: 0.5rem; align-items: stretch;
      margin-bottom: 0.375rem;
    }
    .img-upload-group input[type="url"] {
      flex: 1; padding: 0.5625rem 0.75rem;
      border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      font-size: 0.8125rem; font-family: inherit; outline: none;
      background: var(--white); color: var(--n-900);
      transition: border-color var(--t-fast);
    }
    .img-upload-group input[type="url"]:focus { border-color: var(--blue); }
    .img-upload-file-btn {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.5rem 0.875rem;
      background: var(--n-100); border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      font-size: 0.75rem; font-weight: 600; color: var(--n-700);
      cursor: pointer; white-space: nowrap;
      transition: background var(--t-fast), border-color var(--t-fast);
    }
    .img-upload-file-btn:hover { background: var(--blue-xl); border-color: var(--blue-l); color: var(--blue); }

    /* ── Product form helpers ── */
    .admin-section-label {
      font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--n-500);
      margin-bottom: 0.625rem; margin-top: 0.25rem;
    }
    .flag-label {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.8125rem; font-weight: 500; color: var(--n-700);
      cursor: pointer; user-select: none;
    }
    .flag-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--blue); }
    .visibility-flag { padding: 0.375rem 0.75rem; background: var(--blue-xl); border-radius: var(--r-pill); color: var(--blue-d); }

    /* ── btn-sm ── */
    .btn-sm { padding: 0.3rem 0.625rem !important; font-size: 0.6875rem !important; }

    /* ── form-group & form-row (scoped to admin) ── */
    .form-group { margin-bottom: 0.875rem; }
    .form-group label {
      display: block; font-size: 0.6875rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--n-700); margin-bottom: 0.3rem;
    }
    .form-group input:not([type="checkbox"]),
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 0.5625rem 0.75rem;
      border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      font-size: 0.8125rem; font-family: inherit; outline: none;
      color: var(--n-900); background: var(--white);
      transition: border-color var(--t-fast);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(20,85,164,.07);
    }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .admin-page-body { flex-direction: column; }
      .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--n-200); padding: 0.5rem 0.75rem; overflow-y: unset; }
      .admin-tabs { flex-direction: row; flex-wrap: wrap; }
      .admin-tab  { padding: 0.5rem 0.625rem; font-size: 0.75rem; }
      .admin-content { padding: 1rem; }
      .admin-stats { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Login gate ── */
    #admin-login-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: linear-gradient(135deg, var(--blue-d) 0%, var(--blue) 60%, var(--blue-l) 100%);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .login-card {
      background: var(--white); border-radius: var(--r-2xl);
      width: 100%; max-width: 420px; padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(12,56,116,.35);
    }
    .login-field {
      width: 100%; padding: .6875rem .875rem;
      border: 1.5px solid var(--n-200); border-radius: var(--r-md);
      font-size: .9375rem; font-family: inherit; outline: none;
      color: var(--n-900); background: var(--white);
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
      box-sizing: border-box;
    }
    .login-field:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(20,85,164,.1); }
    .login-submit {
      width: 100%; padding: .8125rem; background: var(--blue); color: #fff;
      border: none; border-radius: var(--r-md);
      font-size: .9375rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background var(--t-fast);
    }
    .login-submit:hover:not(:disabled) { background: var(--blue-d); }
    .login-submit:disabled { opacity: .6; cursor: default; }
    .login-divider {
      display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--n-200);
    }
    .login-divider span { font-size: .75rem; color: var(--n-400); font-weight: 500; }

    /* User badge in header */
    .admin-user-badge {
      display: flex; align-items: center; gap: .5rem;
      padding: .3rem .75rem; background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3); border-radius: var(--r-pill);
      font-size: .75rem; color: rgba(255,255,255,.9);
    }
    .admin-user-badge strong { font-weight: 700; }
    .admin-user-role {
      background: rgba(255,255,255,.2); padding: .1rem .4rem;
      border-radius: var(--r-pill); font-size: .625rem; text-transform: uppercase;
      letter-spacing: .06em; font-weight: 700;
    }
    .admin-logout-btn {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .4rem .875rem; background: rgba(220,38,38,.25);
      border: 1px solid rgba(220,38,38,.4); border-radius: var(--r-pill);
      color: #fca5a5; font-size: .75rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background var(--t-fast);
    }
    .admin-logout-btn:hover { background: rgba(220,38,38,.4); }
  </style>
</head>
<body>

<!-- PAGE HEADER -->
<header class="admin-page-header">
  <div class="admin-page-header-left">
    <img src="assets/images/logo.jpeg" alt="IBH" />
    <h1>Admin Dashboard</h1>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
    <div class="admin-user-badge" id="admin-user-badge" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <strong id="admin-user-name"></strong>
      <span class="admin-user-role" id="admin-user-role"></span>
    </div>
    <button class="admin-logout-btn" id="admin-logout-btn" style="display:none" onclick="AdminGate.logout()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
    <a href="index.html" class="admin-back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Store
    </a>
  </div>
</header>

<!-- PAGE BODY -->
<div class="admin-page-body">

  <!-- SIDEBAR -->
  <nav class="admin-sidebar" role="navigation" aria-label="Admin sections">
    <div class="admin-tabs" role="tablist">
      <button class="admin-tab active" data-tab="orders" role="tab" aria-selected="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Orders
      </button>
      <button class="admin-tab" data-tab="products" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Products
      </button>
      <button class="admin-tab" data-tab="brands" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Brands
      </button>
      <button class="admin-tab" data-tab="categories" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Categories
      </button>
      <button class="admin-tab" data-tab="add-product" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Product
      </button>
      <button class="admin-tab" data-tab="users" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </button>
      <button class="admin-tab" data-tab="delivery" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Delivery Areas
      </button>
      <button class="admin-tab" data-tab="settings" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </nav>

  <!-- CONTENT AREA -->
  <div class="admin-content" id="admin-content" role="main" aria-live="polite"></div>

</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container" aria-live="polite" role="status"></div>

<!-- LOGIN GATE — covers everything until authenticated -->
<div id="admin-login-screen">
  <div class="login-card">

    <!-- Loading spinner (shown during session check) -->
    <div id="login-loading" style="text-align:center;padding:1.5rem 0">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" style="animation:spin 1s linear infinite">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      <p style="margin-top:.75rem;font-size:.875rem;color:var(--n-500)">Checking session…</p>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <!-- Login form (hidden initially, shown if no valid session) -->
    <div id="login-content" style="display:none">
      <!-- Logo -->
      <div style="text-align:center;margin-bottom:2rem">
        <img src="assets/images/logo.jpeg" alt="IBH"
          style="width:60px;height:60px;border-radius:var(--r-lg);object-fit:contain;margin-bottom:.875rem"
          onerror="this.style.display='none'">
        <h2 style="font-family:var(--f-display);font-size:1.375rem;font-weight:700;color:var(--blue-d);margin:0">Admin Dashboard</h2>
        <p style="font-size:.8125rem;color:var(--n-500);margin:.25rem 0 0">Sign in to manage your store</p>
      </div>

      <!-- Error message -->
      <div id="login-error" style="display:none;background:var(--err-bg);color:var(--err);padding:.75rem 1rem;border-radius:var(--r-md);font-size:.8125rem;font-weight:500;margin-bottom:1.25rem"></div>

      <!-- Form -->
      <form id="login-form" autocomplete="on">
        <div style="margin-bottom:.875rem">
          <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.35rem">Email or Phone</label>
          <input id="login-identifier" type="text" class="login-field" placeholder="admin@example.com or 07xxxxxxxx" autocomplete="username" required>
        </div>
        <div style="margin-bottom:1.5rem">
          <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.35rem">Password</label>
          <input id="login-password" type="password" class="login-field" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button id="login-btn" type="submit" class="login-submit">Sign In</button>
      </form>

      <!-- Google -->
      <div id="google-signin-section">
        <div class="login-divider"><span>or</span></div>
        <div id="google-signin-btn" style="display:flex;justify-content:center"></div>
      </div>

      <!-- Back link -->
      <p style="text-align:center;margin-top:1.5rem">
        <a href="index.html" style="font-size:.8125rem;color:var(--n-400);text-decoration:none">← Back to Store</a>
      </p>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>

<!-- Minimal App shim so admin.js works without app.js -->
<script>
  let _toastTimer;
  const App = {
    toast(msg, type = '') {
      clearTimeout(_toastTimer);
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      _toastTimer = setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 400);
      }, 3000);
    },
    refreshHome: () => {},
    applyHeroBg: () => {},
  };
</script>

<script src="js/admin.js"></script>

<script>
/* ══════════════════════════════════════════
   AdminGate — session check + login UI
══════════════════════════════════════════ */
const AdminGate = (() => {
  const SESSION_KEY = 'ibh_session';

  async function _checkSession() {
    const token = localStorage.getItem(SESSION_KEY);
    if (!token) return null;
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) { localStorage.removeItem(SESSION_KEY); return null; }
      return await res.json();
    } catch { return null; }
  }

  async function _login(identifier, password) {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    if (!['admin', 'staff', 'branch_manager'].includes(data.role))
      throw new Error('This account does not have admin access');
    localStorage.setItem(SESSION_KEY, data.token);
    return data;
  }

  async function _googleLogin(credential) {
    const res  = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Google login failed');
    if (!['admin', 'staff', 'branch_manager'].includes(data.role))
      throw new Error('This Google account does not have admin access');
    localStorage.setItem(SESSION_KEY, data.token);
    return data;
  }

  function _showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function _bootDashboard(user) {
    window.AdminUser = user;

    /* Update header */
    document.getElementById('admin-user-name').textContent  = user.name;
    document.getElementById('admin-user-role').textContent  = (user.role || '').replace('_', ' ');
    document.getElementById('admin-user-badge').style.display = '';
    document.getElementById('admin-logout-btn').style.display  = '';

    /* Hide login gate */
    document.getElementById('admin-login-screen').style.display = 'none';

    /* Restrict sidebar for branch_manager */
    if (user.role === 'branch_manager') {
      document.querySelectorAll('.admin-tab').forEach(tab => {
        if (tab.dataset.tab !== 'orders') tab.style.display = 'none';
      });
    }

    /* Boot the dashboard */
    API.init();
    Admin.switchTab('orders');
    document.querySelector('.admin-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.admin-tab');
      if (tab && tab.dataset.tab) Admin.switchTab(tab.dataset.tab);
    });
  }

  async function init() {
    /* 1. Try existing session */
    const user = await _checkSession();
    if (user && ['admin', 'staff', 'branch_manager'].includes(user.role)) {
      _bootDashboard(user);
      return;
    }

    /* 2. Show login form */
    document.getElementById('login-loading').style.display = 'none';
    document.getElementById('login-content').style.display = 'block';

    /* 3. Bind login form */
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      document.getElementById('login-error').style.display = 'none';
      try {
        const u = await _login(
          document.getElementById('login-identifier').value.trim(),
          document.getElementById('login-password').value,
        );
        _bootDashboard(u);
      } catch (err) {
        _showError(err.message);
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });

    /* 4. Google Sign-In (only if configured) */
    if (Config.GOOGLE_CLIENT_ID) {
      const gsiScript  = document.createElement('script');
      gsiScript.src    = 'https://accounts.google.com/gsi/client';
      gsiScript.async  = true;
      gsiScript.defer  = true;
      gsiScript.onload = () => {
        google.accounts.id.initialize({
          client_id: Config.GOOGLE_CLIENT_ID,
          callback:  (r) => {
            document.getElementById('login-error').style.display = 'none';
            _googleLogin(r.credential).then(_bootDashboard).catch(err => _showError(err.message));
          },
        });
        google.accounts.id.renderButton(
          document.getElementById('google-signin-btn'),
          { theme: 'outline', size: 'large', width: 300, text: 'signin_with' },
        );
      };
      document.head.appendChild(gsiScript);
    } else {
      document.getElementById('google-signin-section').style.display = 'none';
    }
  }

  function logout() {
    const token = localStorage.getItem(SESSION_KEY);
    if (token) {
      fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      }).catch(() => {});
    }
    localStorage.removeItem(SESSION_KEY);
    window.location.reload();
  }

  return { init, logout };
})();

document.addEventListener('DOMContentLoaded', () => AdminGate.init());
</script>

</body>
</html>
