<!-- CART DRAWER -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="cart-drawer" id="cart-drawer" role="dialog" aria-label="Shopping cart" aria-hidden="true">
  <div class="cart-drawer-header">
    <h2 class="cart-drawer-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Cart <span class="cart-count-badge" id="cart-drawer-count">0</span>
    </h2>
    <button class="drawer-close" id="cart-close" aria-label="Close cart">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="cart-drawer-body" id="cart-items" aria-live="polite"></div>
  <div class="cart-drawer-footer" id="cart-footer"></div>
</aside>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="product-overlay">
  <div class="modal" id="product-modal" role="dialog" aria-label="Product details" aria-hidden="true">
    <button class="modal-close" id="product-modal-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-body" id="product-modal-body"></div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkout-overlay">
  <div class="modal modal-wide" id="checkout-modal" role="dialog" aria-label="Checkout" aria-hidden="true">
    <button class="modal-close" id="checkout-modal-close" aria-label="Close checkout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-body" id="checkout-modal-body"></div>
  </div>
</div>

<!-- AUTH MODAL (Sign In / Register) -->
<div class="modal-overlay" id="auth-overlay" style="z-index:450">
  <div class="modal" id="auth-modal" role="dialog" aria-label="Sign in" aria-hidden="true" style="max-width:420px;width:100%;padding:2rem 1.75rem">
    <button class="modal-close" id="auth-modal-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:2px solid var(--n-200);margin-bottom:1.5rem;margin-top:.25rem">
      <button id="auth-tab-login" style="flex:1;padding:.625rem;font-size:.875rem;font-weight:700;color:var(--blue);border:none;background:none;border-bottom:2px solid var(--blue);margin-bottom:-2px;cursor:pointer;font-family:inherit">Sign In</button>
      <button id="auth-tab-register" style="flex:1;padding:.625rem;font-size:.875rem;font-weight:600;color:var(--n-500);border:none;background:none;cursor:pointer;font-family:inherit">Register</button>
    </div>

    <!-- Error -->
    <div id="auth-error" style="display:none;background:var(--err-bg);color:var(--err);padding:.625rem .875rem;border-radius:var(--r-md);font-size:.8125rem;font-weight:500;margin-bottom:1rem"></div>

    <!-- SIGN IN form -->
    <form id="auth-login-form">
      <div style="margin-bottom:.875rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Email or Phone</label>
        <input id="auth-identifier" type="text" placeholder="Email or phone number"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'" required>
      </div>
      <div style="margin-bottom:1.25rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Password</label>
        <input id="auth-password" type="password" placeholder="Password"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'" required>
      </div>
      <button type="submit" id="auth-login-btn"
        style="width:100%;padding:.75rem;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);font-size:.9375rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s"
        onmouseover="this.style.background='var(--blue-d)'" onmouseout="this.style.background='var(--blue)'">Sign In</button>
    </form>

    <!-- REGISTER form (hidden) -->
    <form id="auth-register-form" style="display:none">
      <div style="margin-bottom:.75rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Full Name</label>
        <input id="reg-name" type="text" placeholder="Your full name"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'" required>
      </div>
      <div style="margin-bottom:.75rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Phone</label>
        <input id="reg-phone" type="tel" placeholder="07xxxxxxxx"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'" required>
      </div>
      <div style="margin-bottom:.75rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Email (optional)</label>
        <input id="reg-email" type="email" placeholder="your@email.com"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'">
      </div>
      <div style="margin-bottom:1.25rem">
        <label style="display:block;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n-700);margin-bottom:.3rem">Password</label>
        <input id="reg-password" type="password" placeholder="At least 6 characters"
          style="width:100%;padding:.625rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);box-sizing:border-box;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'" required>
      </div>
      <button type="submit" id="auth-register-btn"
        style="width:100%;padding:.75rem;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);font-size:.9375rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s"
        onmouseover="this.style.background='var(--blue-d)'" onmouseout="this.style.background='var(--blue)'">Create Account</button>
    </form>

    <!-- Google -->
    <div id="auth-google-section">
      <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0">
        <div style="flex:1;height:1px;background:var(--n-200)"></div>
        <span style="font-size:.75rem;color:var(--n-400);font-weight:500">or</span>
        <div style="flex:1;height:1px;background:var(--n-200)"></div>
      </div>
      <div id="auth-google-btn" style="display:flex;justify-content:center"></div>
    </div>
  </div>
</div>

<!-- TRACK ORDER MODAL -->
<div class="modal-overlay" id="track-order-overlay" style="z-index:500">
  <div class="modal" id="track-order-modal" role="dialog" aria-label="Track your order" aria-hidden="true"
    style="max-width:480px;width:100%;padding:2rem 1.75rem">
    <button class="modal-close" id="track-order-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--blue-xl);display:flex;align-items:center;justify-content:center;margin:0 auto .875rem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <h2 style="font-family:var(--f-display);font-size:1.25rem;font-weight:700;color:var(--blue-d);margin:0 0 .25rem">Track Your Order</h2>
      <p style="font-size:.875rem;color:var(--n-500);margin:0">Enter your order ID to see its current status</p>
    </div>
    <div style="display:flex;gap:.5rem;margin-bottom:1.25rem">
      <input id="track-order-input" type="text" placeholder="e.g. IBH-1749123456789"
        style="flex:1;padding:.6875rem .875rem;border:1.5px solid var(--n-200);border-radius:var(--r-md);font-size:.9rem;font-family:inherit;outline:none;color:var(--n-900);transition:border-color .2s"
        onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--n-200)'">
      <button id="track-order-btn-search" class="btn btn-primary" style="padding:.6875rem 1.25rem;white-space:nowrap">Search</button>
    </div>
    <div id="track-order-result"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="admin-overlay"></div>
<div class="admin-panel" id="admin-panel" role="dialog" aria-label="Admin dashboard" aria-hidden="true">
  <div class="admin-header">
    <div class="admin-header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <h2>Admin Dashboard</h2>
    </div>
    <button class="admin-close" id="admin-close" aria-label="Close admin">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="admin-body">
    <div class="admin-sidebar">
      <nav class="admin-tabs" role="tablist" aria-label="Admin sections">

          Orders
        </button>
        <button class="admin-tab" data-tab="products" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Products
        </button>
        <button class="admin-tab" data-tab="brands" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Brands
        </button>
        <button class="admin-tab" data-tab="categories" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Categories
        </button>
        <button class="admin-tab" data-tab="add-product" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Product
        </button>
        <button class="admin-tab" data-tab="users" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </button>
        <button class="admin-tab" data-tab="settings" role="tab">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </nav>
    </div>
    <div class="admin-content" id="admin-content" aria-live="polite"></div>
  </div>
</div>
